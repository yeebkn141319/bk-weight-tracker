<!DOCTYPE html><html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>BK Tracker</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
*{box-sizing:border-box}body{background:#0f0f1e;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;align-items:center}
.card{background:#1a1a2e;border:none;border-radius:16px}.gold{color:#c98a3a}
.gold-bg{background:#c98a3a;border:none;color:#fff}.gold-bg:hover{background:#a06d2a;color:#fff}
input{background:#252540;border:1px solid #333;color:#fff;border-radius:10px;padding:12px;width:100%;font-size:15px}
input:focus{outline:none;border-color:#c98a3a}input::placeholder{color:#666}
</style></head>
<body>
<div class="container" style="max-width:420px">
<div class="text-center mb-4"><div style="font-size:48px">🏋️</div><h2 class="gold">BK Tracker</h2><p class="text-secondary small">Coach Login</p></div>
{% if error %}<div class="alert alert-danger py-2 small">{{ error }}</div>{% endif %}
<div class="card p-4">
<form method="POST" action="/login">
<div class="mb-3"><input type="text" name="username" placeholder="Username" value="bk" required></div>
<div class="mb-3"><input type="password" name="password" placeholder="Password" required></div>
<button type="submit" class="btn gold-bg w-100 py-2 fw-bold">Login</button>
</form>
</div>
<div class="text-center mt-3"><a href="{{ url_for('client_login') }}" class="text-secondary small">Client →</a></div>
</div></body></html>
