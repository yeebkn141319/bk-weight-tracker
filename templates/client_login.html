<!DOCTYPE html><html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>BK Tracker - Client Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body{background:#0f0f1e;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;align-items:center}
.card{background:#1a1a2e;border:none;border-radius:16px}.gold{color:#c98a3a}.gold-bg{background:#c98a3a;border:none;color:#fff}.gold-bg:hover{background:#a06d2a}
input{background:#252540;border:1px solid #333;color:#fff;border-radius:10px;padding:12px;width:100%;font-size:15px}input:focus{outline:none;border-color:#c98a3a}
</style></head>
<body>
<div class="container" style="max-width:420px">
<div class="text-center mb-4"><div style="font-size:48px">🏋️</div><h2 class="gold">BK Tracker</h2><p class="text-secondary small">Client Login</p></div>
{% if error %}<div class="alert alert-danger py-2 small">{{ error }}</div>{% endif %}
<div class="card p-4">
<form method="POST">
<div class="mb-3"><input type="text" name="phone" placeholder="Phone Number" required></div>
<div class="mb-3"><input type="password" name="password" placeholder="Birthday (DDMMYY)" required></div>
<button type="submit" class="btn gold-bg w-100 py-2 fw-bold">Login</button>
<p class="text-secondary small mt-3 text-center">Password is your birthday DDMMYY</p>
</form>
</div>
</div></body></html>
