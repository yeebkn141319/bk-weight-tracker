<!DOCTYPE html><html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Edit Session - {{ client.name }}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
*{box-sizing:border-box}body{background:#0f0f1e;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:16px}
.card{background:#1a1a2e;border:none;border-radius:16px;padding:16px;margin-bottom:10px}
.gold{color:#c98a3a}.gold-bg{background:#c98a3a;border:none;color:#fff}.gold-bg:hover{background:#a06d2a}
input{background:#252540;border:1px solid #333;color:#fff;border-radius:10px;padding:8px;width:100%;font-size:13px}
input:focus{outline:none;border-color:#c98a3a}
@media(min-width:768px){.cont{max-width:600px;margin:0 auto}}
</style></head>
<body>
<div class="cont">
<div class="d-flex align-items-center mb-3">
<a href="{{ url_for('client_detail',cid=client.id) }}" class="text-secondary text-decoration-none me-2" style="font-size:20px">←</a>
<h5 class="gold mb-0">Edit Session — {{ client.name }}</h5>
</div>
<div class="card">
<form method="POST">
<div class="row g-1 mb-1">
<div class="col-4"><input type="date" name="date" value="{{ session.date[:10] }}"></div>
<div class="col-4"><input type="number" name="weight" step="0.1" value="{{ session.weight or '' }}" placeholder="Weight"></div>
<div class="col-4"><input type="number" name="body_fat" step="0.1" value="{{ session.body_fat or '' }}" placeholder="Body Fat %"></div>
</div>
<div class="row g-1 mb-1">
<div class="col-4"><input type="number" name="visceral_fat" step="0.1" value="{{ session.visceral_fat or '' }}" placeholder="Visceral"></div>
<div class="col-4"><input type="number" name="muscle_mass" step="0.1" value="{{ session.muscle_mass or '' }}" placeholder="Muscle %"></div>
<div class="col-4"><input type="number" name="bmr" value="{{ session.bmr or '' }}" placeholder="BMR"></div>
</div>
<div class="row g-1 mb-1">
<div class="col-4"><input type="number" name="body_age" value="{{ session.body_age or '' }}" placeholder="Body Age"></div>
<div class="col-4"><input type="number" name="waist" step="0.1" value="{{ session.waist or '' }}" placeholder="Waist cm"></div>
<div class="col-4"><input type="number" name="abdomen" step="0.1" value="{{ session.abdomen or '' }}" placeholder="Abdomen cm"></div>
</div>
<div class="row g-1 mb-1">
<div class="col-4"><input type="number" name="hip" step="0.1" value="{{ session.hip or '' }}" placeholder="Hip cm"></div>
<div class="col-4"><input type="number" name="thigh" step="0.1" value="{{ session.thigh or '' }}" placeholder="Thigh cm"></div>
<div class="col-4"><input type="text" name="notes" value="{{ session.notes or '' }}" placeholder="Notes"></div>
</div>
<button type="submit" class="btn gold-bg w-100 py-2 fw-bold mt-2">💾 Update Session</button>
</form>
</div>
</div>
</body></html>
