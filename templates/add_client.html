<!DOCTYPE html><html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Add Client</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body{background:#0f0f1e;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
.gold{color:#c98a3a}.gold-bg{background:#c98a3a;border:none;color:#fff}.gold-bg:hover{background:#a06d2a}
.card{background:#1a1a2e;border:none;border-radius:16px}
input,select{background:#252540;border:1px solid #333;color:#fff;border-radius:10px;padding:10px;width:100%;font-size:14px}
input:focus,select:focus{outline:none;border-color:#c98a3a}
@media(min-width:768px){.container{max-width:480px;margin:0 auto;padding:20px}}
</style></head>
<body>
<div class="container p-3">
<div class="d-flex align-items-center mb-3"><a href="{{ url_for('coach_dash') }}" class="text-secondary text-decoration-none me-2">←</a><h5 class="gold mb-0">Add Client</h5></div>
{% if error %}<div class="alert alert-danger py-1 small">{{ error }}</div>{% endif %}
<div class="card p-4">
<form method="POST">
<div class="mb-2"><input type="text" name="name" placeholder="Full Name *" required></div>
<div class="mb-2"><input type="text" name="phone" placeholder="Phone Number * (login ID)" required></div>
<div class="row g-2 mb-2">
<div class="col-6"><input type="date" name="birthday" placeholder="Birthday" required></div>
<div class="col-3"><input type="number" name="height" step="0.1" placeholder="Height (cm)" required></div>
<div class="col-3"><select name="gender"><option value="M">Male</option><option value="F">Female</option></select></div>
</div>
<hr class="border-secondary">
<div class="row g-2 mb-2">
<div class="col-6"><input type="number" name="goal_weight" step="0.1" placeholder="Goal (kg)"></div>
</div>
<p class="text-secondary small">Password auto-set to birthday DDMMYY. Client logs in with phone number.</p>
<button type="submit" class="btn gold-bg w-100 py-2 fw-bold">Add Client</button>
</form>
</div>
</div></body></html>
